name: Update Model Catalog

on:
  schedule:
    # Daily at 06:00 UTC. Fetches the live OpenRouter feed and regenerates
    # src/lib/models.generated.ts so pricing stays current and newly-shipped
    # models (Claude/GPT/Gemini/etc.) appear automatically the next day.
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions UI.

# NOTE: This project uses `main` as the default branch. Always push to main, never master.

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate model catalog from OpenRouter + quality leaderboards
        working-directory: app
        env:
          # Optional: add AA_API_KEY as a repo Actions secret for full
          # Artificial Analysis quality coverage (free key at artificialanalysis.ai).
          # Without it, quality falls back to the live Arena leaderboard + baseline.
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
        run: node scripts/build-models.mjs

      - name: Commit catalog if it changed
        id: commit
        run: |
          git config user.name "TokenRate ModelBot"
          git config user.email "bot@tokenrate.dev"
          git add app/src/lib/models.generated.ts
          if git diff --cached --quiet; then
            echo "No model changes today."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            COUNT=$(grep -c '"slug":' app/src/lib/models.generated.ts || echo "?")
            git commit -m "models: daily refresh from OpenRouter (${COUNT} live models)"
            git pull --rebase origin main
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Best-effort: tell IndexNow (Bing, Yandex, …) to re-crawl, so newly-shipped
      # model/blog/compare pages get submitted the day they appear instead of
      # waiting for an organic crawl — directly addresses the indexing bottleneck.
      # Submits straight to the IndexNow API using the PUBLIC key file served at
      # /tokenrate-indexnow-key.txt — no secret to configure, so it self-activates.
      # Runs only when the catalog changed; never fails the refresh.
      - name: Ping IndexNow
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          # Give Vercel a head start to deploy this run's commit so the sitemap
          # reflects today's catalog. Stragglers are caught on the next run.
          sleep 120
          KEY=$(curl -fsS https://tokenrate.dev/tokenrate-indexnow-key.txt | tr -d '[:space:]')
          if [ -z "$KEY" ]; then echo "No IndexNow key file; skipping."; exit 0; fi
          # Canonical URLs straight from the sitemap (already excludes noindex variants).
          URLS=$(curl -fsS https://tokenrate.dev/sitemap.xml | grep -oE '<loc>[^<]+</loc>' | sed -E 's#</?loc>##g')
          COUNT=$(printf '%s\n' "$URLS" | grep -c .)
          if [ "${COUNT:-0}" -eq 0 ]; then echo "No URLs in sitemap; skipping."; exit 0; fi
          URLJSON=$(printf '%s\n' "$URLS" | sed 's/.*/"&"/' | paste -sd, -)
          BODY=$(printf '{"host":"tokenrate.dev","key":"%s","keyLocation":"https://tokenrate.dev/tokenrate-indexnow-key.txt","urlList":[%s]}' "$KEY" "$URLJSON")
          echo "Submitting $COUNT URLs to IndexNow…"
          curl -sS -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$BODY" -w "\nHTTP %{http_code}\n"
          exit 0

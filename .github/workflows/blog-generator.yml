name: Auto Blog Generator

on:
  schedule:
    # Once a day at 13:00 UTC. The generator researches the day's sharpest
    # rate-comparison angle (live pricing + web search), writes one high-quality
    # article, and publishes only if it clears the quality/novelty gate — so a
    # daily run is plenty and keeps the publish log clean.
    - cron: '0 13 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

# NOTE: This project uses `main` as the default branch. Always push to main, never master.

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    # Research (web search) + writing, plus patience for the org's per-minute
    # token rate limit (the generator waits out 429s honouring retry-after).
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify secret is injected
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is empty. Check repo Settings → Secrets and variables → Actions → Repository secrets (NOT Environment secrets) and add ANTHROPIC_API_KEY there."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY is set (length: ${#ANTHROPIC_API_KEY} chars, prefix: ${ANTHROPIC_API_KEY:0:7}...)"

      - name: Run blog generator
        working-directory: app
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: set a repo variable BLOG_MODEL to override the writing model
          # (Settings → Secrets and variables → Actions → Variables). Defaults to
          # claude-sonnet-4-6; set to claude-opus-4-8 for maximum quality.
          BLOG_MODEL: ${{ vars.BLOG_MODEL }}
        run: node scripts/blog-generator.mjs

      - name: Rebuild blog catalog
        working-directory: app
        run: node scripts/build-blog-catalog.mjs

      - name: Commit post if created
        run: |
          git config user.name "TokenRate BlogBot"
          git config user.email "bot@tokenrate.dev"
          git add app/content/ app/src/lib/blog-catalog.generated.ts
          if git diff --cached --quiet; then
            echo "No new posts to commit."
          else
            SLUG=$(git diff --cached --name-only -- 'app/content/blog/*.json' | head -1 | xargs -I{} basename {} .json 2>/dev/null || echo "post")
            git commit -m "blog: auto-publish — ${SLUG}"
            git pull --rebase origin main
            git push origin main
          fi

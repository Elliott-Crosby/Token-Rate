name: Auto Blog Generator

on:
  schedule:
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

# NOTE: This project uses `main` as the default branch. Always push to main, never master.

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify secret is injected
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is empty. Check repo Settings → Secrets and variables → Actions → Repository secrets (NOT Environment secrets) and add ANTHROPIC_API_KEY there."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY is set (length: ${#ANTHROPIC_API_KEY} chars, prefix: ${ANTHROPIC_API_KEY:0:7}...)"

      - name: Run blog generator
        working-directory: app
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/blog-generator.mjs

      - name: Commit post if created
        run: |
          git config user.name "TokenRate BlogBot"
          git config user.email "bot@tokenrate.dev"
          git add app/content/blog/
          if git diff --cached --quiet; then
            echo "No new posts to commit."
          else
            SLUG=$(git diff --cached --name-only | head -1 | xargs basename 2>/dev/null || echo "post")
            git commit -m "blog: auto-publish — ${SLUG}"
            git push origin main
          fi
